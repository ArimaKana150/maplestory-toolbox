<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新楓之谷 工具箱 — 首頁</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 頂部導覽 bar -->
    <nav class="navbar">
        <a class="nav-logo" href="index.html">
            <span class="logo-dot"></span>新楓之谷 <span class="logo-accent">工具箱</span>
        </a>
        <div class="nav-links">
            <a href="index.html" class="active">首頁</a>
            <a href="calculator.html">計算機</a>
            <a href="dress.html">穿搭</a>
        </div>
    </nav>

    <!-- Hero banner -->
    <header class="hero">
        <span class="hero-tag">MAPLESTORY TOOLBOX</span>
        <h1>新楓之谷<br>工具箱</h1>
        <p class="lead">集合 VIP 階級計算、角色穿搭預覽等實用工具，專為新楓之谷玩家打造，持續擴充中。</p>
        <a class="btn-neon" href="#tools">開始使用 <span class="arrow">&rarr;</span></a>
    </header>

    <!-- 特色介紹 -->
    <main class="wrap">
        <div class="features" id="tools">
            <a class="feature tool-card" href="calculator.html">
                <div class="f-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="6" x2="15" y2="6"/><line x1="9" y1="11" x2="9.01" y2="11"/><line x1="12" y1="11" x2="12.01" y2="11"/><line x1="15" y1="11" x2="15.01" y2="11"/><line x1="9" y1="15" x2="9.01" y2="15"/><line x1="12" y1="15" x2="12.01" y2="15"/></svg>
                </div>
                <h3>VIP 計算機</h3>
                <p>輸入目前累積點數，算出距各 VIP 階級還差多少點數與消費。</p>
                <span class="tool-go">開啟工具 &rarr;</span>
            </a>
            <a class="feature tool-card" href="dress.html">
                <div class="f-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3 3 7l2 3 2-1v11h10V9l2 1 2-3-5-4a4 4 0 0 1-8 0z"/></svg>
                </div>
                <h3>角色穿搭</h3>
                <p>線上預覽髮型、臉型、裝備，並直接顯示每件道具代碼。</p>
                <span class="tool-go">開啟工具 &rarr;</span>
            </a>
            <div class="feature tool-card disabled">
                <div class="f-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
                <h3>更多工具</h3>
                <p>持續擴充中，敬請期待。</p>
                <span class="tool-go muted">敬請期待</span>
            </div>
        </div>
    </main>

    <footer class="page-footer">
        <p>本工具依官方公告規則製作，皇家黑為前 50 名審核制不列入計算，實際以官方公告為準。</p>
    </footer>
</body>
</html>
